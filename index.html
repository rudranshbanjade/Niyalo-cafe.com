<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Boring Edit · Order Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0b0b; font-family: 'Inter', sans-serif; color: #eaeaea; scroll-behavior: smooth; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
    .btn-primary { background: linear-gradient(95deg, #e67e22, #f39c12); border: none; padding: 1rem 2rem; border-radius: 60px; font-weight: 700; color: #0a0a0a; cursor: pointer; transition: 0.2s; }
    .btn-outline { background: transparent; border: 1.5px solid #e67e22; padding: 0.8rem 2rem; border-radius: 60px; font-weight: 600; cursor: pointer; }
    .card-3d { background: #131313; border-radius: 28px; transition: 0.2s; box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6); border: 1px solid rgba(230,126,34,0.2); }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
    .cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: #0f0f0f; backdrop-filter: blur(24px); border-left: 1px solid #e67e2240; z-index: 1000; transition: right 0.3s; padding: 1.5rem; display: flex; flex-direction: column; }
    .cart-sidebar.open { right: 0; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 999; display: none; }
    .cart-overlay.active { display: block; }
    .owner-panel { position: fixed; top: 0; left: -380px; width: 380px; height: 100vh; background: #0c0c0c; border-right: 1px solid #e67e22; z-index: 1100; transition: left 0.3s; padding: 1.5rem; overflow-y: auto; }
    .owner-panel.open { left: 0; }
    .owner-toggle { position: fixed; bottom: 20px; left: 20px; background: #1f1f1f; border-radius: 60px; padding: 12px 20px; z-index: 1200; cursor: pointer; border: 1px solid #e67e22; display: flex; gap: 8px; align-items: center; }
    input, textarea, select { background: #1e1e1e; border: 1px solid #333; padding: 12px 16px; border-radius: 60px; color: white; width: 100%; margin-bottom: 12px; }
    .switch { position: relative; display: inline-block; width: 52px; height: 28px; margin-right: 12px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #e67e22; }
    input:checked + .slider:before { transform: translateX(24px); }
    @media (max-width: 720px) { .cart-sidebar { width: 100%; right: -100%; } .owner-panel { width: 85%; } }
    .qr-preview { max-width: 180px; margin: 1rem auto; display: block; border-radius: 20px; }
    .badge-pill { background: #2c2c2c; padding: 0.2rem 1rem; border-radius: 50px; font-size: 0.7rem; }
  </style>
</head>
<body>
  <div class="owner-toggle" id="ownerToggleBtn"><i class="fas fa-crown"></i> <span>Owner Panel</span></div>
  <div class="owner-panel" id="ownerPanel">
    <div style="display:flex; justify-content:space-between; align-items:center;"><h3><i class="fas fa-sliders-h"></i> Dashboard</h3><button id="closeOwnerBtn" style="background:none; border:none; color:white; font-size:1.6rem;">&times;</button></div>
    <div id="authSection">
      <div id="loginBox"><h4>Login</h4><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPass" placeholder="Password"><button id="doLoginBtn" class="btn-primary">Login</button></div>
      <div id="dashboardContent" style="display:none;"></div>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-sidebar" id="cartSidebar"><div style="display:flex; justify-content:space-between;"><h3>🛒 Cart</h3><button id="closeCartBtn" style="background:none; border:none; color:white; font-size:1.8rem;">&times;</button></div><div id="cartItemsList"></div><div id="cartTotal"></div><button id="proceedOrderBtn" class="btn-primary">Order Now</button></div>
  <div id="orderModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#141414; border-radius:40px; padding:2rem; z-index:1300; width:90%; max-width:450px;"><h2>Order Details</h2><input type="text" id="custName" placeholder="Your Name"><input type="tel" id="custPhone" placeholder="Phone"><input type="time" id="pickupTime" value="18:00"><div style="display:flex; gap:12px;"><button id="confirmOrderBtn" class="btn-primary">Send Order</button><button id="closeOrderModal">Cancel</button></div></div>
  <div id="qrModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:2rem; border-radius:32px; text-align:center; z-index:1400;"><i class="fas fa-qrcode" style="font-size:4rem; color:#e67e22;"></i><p>Scan QR to pay</p><img id="qrDisplayImg" width="150"><button id="closeQrModalBtn">Close</button></div>
  <main class="container">
    <section style="display:flex; flex-wrap:wrap; align-items:center; gap:2rem; min-height:85vh;"><div><div style="background:#e67e22; display:inline-block; padding:0.2rem 1rem; border-radius:60px;">THE BORING EDIT</div><h1 style="font-size:4rem;">Modern Cafe <span style="color:#e67e22;">Experience</span></h1><p>Order online, pay by QR, enjoy table service or delivery.</p><div><button id="heroOrderBtn" class="btn-primary">Order Now</button><button id="heroViewMenuBtn" class="btn-outline">View Menu</button></div></div><div><img src="https://placehold.co/500x400/1a1a1a/e67e22?text=Premium+Dish" style="border-radius:40px;"></div></section>
    <section style="margin:4rem 0;"><h2 class="section-title" style="font-size:2rem;">Signature Menu</h2><div id="menuGrid" class="menu-grid"></div></section>
    <section style="margin:4rem 0; background:radial-gradient(#2c1a0a,#0b0b0b); border-radius:48px; padding:3rem; text-align:center;"><h2>Order your favorite food now</h2><button id="ctaOrderBtn" class="btn-primary">Start Order</button></section>
    <footer style="border-top:1px solid #222; padding:2rem 0; display:flex; justify-content:space-between;"><div><h3>The Boring Edit</h3><p>Minimalist • Modern</p></div><div><i class="fas fa-map-pin"></i> Pokhara<br><i class="fas fa-clock"></i> <span id="storeHours">8:00–22:00</span><br><i class="fab fa-whatsapp"></i> <span id="storePhone">+977 9812345678</span></div><div><button id="whatsappFooterBtn" style="background:#25D366; border:none; padding:0.8rem 1.5rem; border-radius:60px;">WhatsApp Order</button></div></footer>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase configuration (replace with your own project credentials)
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Global state
    let menuItems = [];
    let categories = [];
    let settings = { isOpen: true, phone: '+977 9812345678', hours: '8:00–22:00', qr_url: '', whatsappNumber: '977981234567' };
    let cart = [];

    // DOM elements
    const menuGrid = document.getElementById('menuGrid');
    const cartSidebar = document.getElementById('cartSidebar');
    const cartOverlay = document.getElementById('cartOverlay');
    const cartItemsList = document.getElementById('cartItemsList');
    const cartTotalSpan = document.getElementById('cartTotal');
    const ownerPanel = document.getElementById('ownerPanel');
    const authSection = document.getElementById('authSection');
    const dashboardDiv = document.getElementById('dashboardContent');

    // Helper functions
    function openCart() { cartSidebar.classList.add('open'); cartOverlay.classList.add('active'); }
    function closeCart() { cartSidebar.classList.remove('open'); cartOverlay.classList.remove('active'); }
    document.getElementById('closeCartBtn').onclick = closeCart;
    cartOverlay.onclick = closeCart;
    document.getElementById('heroOrderBtn').onclick = openCart;
    document.getElementById('ctaOrderBtn').onclick = openCart;
    document.getElementById('heroViewMenuBtn').onclick = () => document.querySelector('#menuGrid').scrollIntoView({ behavior: 'smooth' });

    // Load data from Supabase (public read)
    async function loadPublicData() {
      try {
        const [{ data: items }, { data: cats }, { data: settingsData }] = await Promise.all([
          supabase.from('menu_items').select('*').order('id'),
          supabase.from('categories').select('*'),
          supabase.from('settings').select('*').single()
        ]);
        if (items) menuItems = items;
        if (cats) categories = cats;
        if (settingsData) {
          settings = { ...settings, ...settingsData };
          document.getElementById('storeHours').innerText = settings.hours || '8:00–22:00';
          document.getElementById('storePhone').innerText = settings.phone || '+977 9812345678';
        }
        renderMenu();
      } catch(e) { console.warn('fallback'); renderMenu(); }
    }

    function renderMenu() {
      if (!menuGrid) return;
      const isOpen = settings.isOpen !== false;
      menuGrid.innerHTML = menuItems.filter(i => i.available !== false).map(item => `
        <div class="card-3d" style="overflow:hidden; padding:0;">
          <img src="${item.image_url || 'https://placehold.co/400x300/222/e67e22?text=Item'}" style="width:100%; height:180px; object-fit:cover;">
          <div style="padding:1rem;">
            <div style="display:flex; justify-content:space-between;"><b>${item.name}</b><span>रू${item.price}</span></div>
            <p style="font-size:0.8rem; color:#aaa;">${item.description || ''}</p>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
              <span class="badge-pill">${categories.find(c=>c.id===item.category_id)?.name || 'item'}</span>
              <button class="add-to-cart" data-id="${item.id}" ${!isOpen ? 'disabled style="opacity:0.5;"' : ''}>Add to cart</button>
            </div>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', (e) => {
        if (!settings.isOpen) return alert('Store closed');
        const id = parseInt(btn.dataset.id);
        const found = menuItems.find(i => i.id === id);
        if (found) { const existing = cart.find(c => c.id === id); if (existing) existing.quantity++; else cart.push({ ...found, quantity: 1 }); updateCartUI(); openCart(); }
      }));
    }

    function updateCartUI() {
      if (!cartItemsList) return;
      let total = 0;
      if (!cart.length) { cartItemsList.innerHTML = '<div style="text-align:center; padding:2rem;">Cart empty</div>'; cartTotalSpan.innerHTML = 'Total: रू0'; return; }
      cartItemsList.innerHTML = cart.map(item => {
        total += item.price * item.quantity;
        return `<div style="display:flex; justify-content:space-between; margin-bottom:0.8rem;"><div><b>${item.name}</b><br>रू${item.price} x ${item.quantity}</div><div><button class="cart-inc" data-id="${item.id}">+</button><button class="cart-dec" data-id="${item.id}">-</button><button class="cart-remove" data-id="${item.id}">remove</button></div></div>`;
      }).join('');
      cartTotalSpan.innerHTML = `Total: रू${total}`;
      document.querySelectorAll('.cart-inc').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); const ci = cart.find(c => c.id === id); if (ci) ci.quantity++; updateCartUI(); }));
      document.querySelectorAll('.cart-dec').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); const ci = cart.find(c => c.id === id); if (ci && ci.quantity > 1) ci.quantity--; else if (ci && ci.quantity === 1) { const idx = cart.findIndex(c => c.id === id); cart.splice(idx,1); } updateCartUI(); }));
      document.querySelectorAll('.cart-remove').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); const idx = cart.findIndex(c => c.id === id); if (idx!==-1) cart.splice(idx,1); updateCartUI(); }));
    }

    // Order and WhatsApp
    const orderModal = document.getElementById('orderModal');
    document.getElementById('proceedOrderBtn').onclick = () => { if (!cart.length) { alert('Cart empty'); return; } orderModal.style.display = 'flex'; };
    document.getElementById('closeOrderModal').onclick = () => orderModal.style.display = 'none';
    document.getElementById('confirmOrderBtn').onclick = async () => {
      const name = document.getElementById('custName').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const time = document.getElementById('pickupTime').value;
      if (!name || !phone) { alert('Enter name & phone'); return; }
      let msg = `🆕 *The Boring Edit Order*\nName: ${name}\nPhone: ${phone}\nPickup: ${time}\n\nItems:\n`;
      let total = 0;
      cart.forEach(i => { msg += `${i.quantity}x ${i.name} - रू${i.price * i.quantity}\n`; total += i.price * i.quantity; });
      msg += `\nTotal: रू${total}\n\n✅ Payment: Scan QR code`;
      const ownerWa = settings.whatsappNumber || '977981234567';
      window.open(`https://wa.me/${ownerWa}?text=${encodeURIComponent(msg)}`, '_blank');
      const qrModal = document.getElementById('qrModal');
      const qrImg = document.getElementById('qrDisplayImg');
      qrImg.src = settings.qr_url || 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Payment+for+The+Boring+Edit';
      qrModal.style.display = 'flex';
      orderModal.style.display = 'none';
      cart = []; updateCartUI(); closeCart();
    };
    document.getElementById('closeQrModalBtn').onclick = () => document.getElementById('qrModal').style.display = 'none';
    document.getElementById('whatsappFooterBtn').onclick = () => { if (cart.length===0) { alert('Add items first'); return; } document.getElementById('proceedOrderBtn').click(); };

    // Owner Dashboard (supabase auth + CRUD)
    let currentSession = null;
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentSession = session;
        document.getElementById('loginBox').style.display = 'none';
        dashboardDiv.style.display = 'block';
        loadDashboardData();
      } else {
        document.getElementById('loginBox').style.display = 'block';
        dashboardDiv.style.display = 'none';
      }
    }
    document.getElementById('doLoginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) alert('Login failed: ' + error.message);
      else checkAuth();
    };
    document.getElementById('closeOwnerBtn').onclick = () => ownerPanel.classList.remove('open');
    document.getElementById('ownerToggleBtn').onclick = () => { if (!currentSession) checkAuth(); ownerPanel.classList.add('open'); };

    async function loadDashboardData() {
      const [{ data: items }, { data: cats }, { data: settingsData }] = await Promise.all([
        supabase.from('menu_items').select('*'),
        supabase.from('categories').select('*'),
        supabase.from('settings').select('*').single()
      ]);
      if (items) menuItems = items;
      if (cats) categories = cats;
      if (settingsData) settings = { ...settings, ...settingsData };
      renderAdminUI();
    }
    function renderAdminUI() {
      dashboardDiv.innerHTML = `
        <div style="margin-bottom:2rem;"><h4>Store Settings</h4>
          <label class="switch"><input type="checkbox" id="storeStatusToggle" ${settings.isOpen ? 'checked' : ''}><span class="slider"></span></label><span>Store ${settings.isOpen ? 'Open' : 'Closed'}</span>
          <label>Phone (WhatsApp)</label><input type="text" id="adminPhone" value="${settings.phone || ''}">
          <label>WhatsApp number (for orders)</label><input type="text" id="adminWhatsapp" value="${settings.whatsappNumber || ''}">
          <label>Hours</label><input type="text" id="adminHours" value="${settings.hours || ''}">
          <label>QR Code URL (image link)</label><input type="text" id="adminQrUrl" value="${settings.qr_url || ''}"><button id="saveSettingsBtn">Save Settings</button>
        </div>
        <div><h4>Categories</h4><div id="categoryList"></div><input type="text" id="newCatName" placeholder="New category"><button id="addCategoryBtn">+ Add</button></div>
        <div><h4>Menu Items</h4><div id="menuItemsAdmin"></div><button id="newItemBtn">+ New Item</button></div>
      `;
      // render categories
      const catDiv = document.getElementById('categoryList');
      catDiv.innerHTML = categories.map(c => `<div style="display:flex; gap:8px; margin:8px 0;"><span>${c.name}</span><button class="delCat" data-id="${c.id}">Delete</button></div>`).join('');
      document.querySelectorAll('.delCat').forEach(btn => btn.addEventListener('click', async (e) => {
        const id = parseInt(btn.dataset.id);
        if (confirm('Delete category? Will unlink items')) { await supabase.from('categories').delete().eq('id', id); loadDashboardData(); }
      }));
      document.getElementById('addCategoryBtn').onclick = async () => {
        const name = document.getElementById('newCatName').value.trim();
        if (name) { await supabase.from('categories').insert({ name }); loadDashboardData(); }
      };
      // render menu items
      const menuAdminDiv = document.getElementById('menuItemsAdmin');
      menuAdminDiv.innerHTML = menuItems.map(item => `
        <div style="border:1px solid #333; border-radius:20px; padding:1rem; margin-bottom:1rem;">
          <input id="itemName_${item.id}" value="${item.name}" placeholder="Name">
          <textarea id="itemDesc_${item.id}" placeholder="Description">${item.description || ''}</textarea>
          <input id="itemPrice_${item.id}" value="${item.price}" type="number">
          <select id="itemCat_${item.id}">${categories.map(c => `<option value="${c.id}" ${c.id===item.category_id ? 'selected' : ''}>${c.name}</option>`).join('')}</select>
          <div>Image URL: <input id="itemImg_${item.id}" value="${item.image_url || ''}" placeholder="https://..."></div>
          <label><input type="checkbox" id="itemAvail_${item.id}" ${item.available ? 'checked' : ''}> Available</label>
          <button class="updateItemBtn" data-id="${item.id}">Save Changes</button>
          <button class="deleteItemBtn" data-id="${item.id}">Delete Item</button>
        </div>
      `).join('');
      // update and delete
      document.querySelectorAll('.updateItemBtn').forEach(btn => btn.addEventListener('click', async (e) => {
        const id = parseInt(btn.dataset.id);
        const name = document.getElementById(`itemName_${id}`).value;
        const description = document.getElementById(`itemDesc_${id}`).value;
        const price = parseFloat(document.getElementById(`itemPrice_${id}`).value);
        const category_id = parseInt(document.getElementById(`itemCat_${id}`).value);
        const image_url = document.getElementById(`itemImg_${id}`).value;
        const available = document.getElementById(`itemAvail_${id}`).checked;
        await supabase.from('menu_items').update({ name, description, price, category_id, image_url, available }).eq('id', id);
        loadDashboardData(); loadPublicData();
      }));
      document.querySelectorAll('.deleteItemBtn').forEach(btn => btn.addEventListener('click', async (e) => {
        if (confirm('Delete item?')) { await supabase.from('menu_items').delete().eq('id', parseInt(btn.dataset.id)); loadDashboardData(); loadPublicData(); }
      }));
      document.getElementById('newItemBtn').onclick = async () => {
        const defaultCat = categories[0]?.id || null;
        await supabase.from('menu_items').insert({ name: 'New Item', price: 199, category_id: defaultCat, available: true, image_url: '' });
        loadDashboardData();
      };
      document.getElementById('saveSettingsBtn').onclick = async () => {
        const isOpen = document.getElementById('storeStatusToggle').checked;
        const phone = document.getElementById('adminPhone').value;
        const hours = document.getElementById('adminHours').value;
        const qr_url = document.getElementById('adminQrUrl').value;
        const whatsappNumber = document.getElementById('adminWhatsapp').value;
        await supabase.from('settings').upsert({ id: 1, is_open: isOpen, phone, hours, qr_url, whatsapp_number: whatsappNumber });
        loadDashboardData(); loadPublicData();
      };
    }
    // initial load
    loadPublicData();
    checkAuth();
    setInterval(loadPublicData, 10000);
  </script>
</body>
</html>
